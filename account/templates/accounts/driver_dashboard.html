{% extends "base.html" %}
{% block title %}Driver Dashboard{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto py-10 space-y-8">
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="card">
            <h3 class="font-semibold">Assigned Route</h3>
            <p class="text-slate-400 text-sm mt-2">View today’s route</p>
        </div>
        <div class="card">
            <h3 class="font-semibold">Bin Alerts</h3>
            <p class="text-slate-400 text-sm mt-2">Urgent pickups</p>
        </div>
        <div class="card">
            <h3 class="font-semibold">Collection Status</h3>
            <p class="text-slate-400 text-sm mt-2">Track progress</p>
        </div>
        <a href="{% url 'assigned_routes' %}" class="card">
            <h3 class="font-semibold">My Routes</h3>
            <p class="text-slate-400 text-sm mt-2">View all routes</p>
        </a>
    </div>
</div>
{% endblock %}
