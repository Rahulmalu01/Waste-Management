{% extends "base.html" %}
{% block title %}Technician Dashboard{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto py-10 space-y-8">
    <div>
        <h1 class="text-3xl font-bold">Technician Dashboard</h1>
        <p class="text-slate-400 mt-1">Device monitoring & maintenance</p>
    </div>
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="card">
            <h3 class="font-semibold">Device Health</h3>
            <p class="text-slate-400 text-sm mt-2">Monitor IoT status</p>
        </div>
        <div class="card">
            <h3 class="font-semibold">Maintenance Tasks</h3>
            <p class="text-slate-400 text-sm mt-2">Pending fixes</p>
        </div>
        <div class="card">
            <h3 class="font-semibold">Bin Hardware</h3>
            <p class="text-slate-400 text-sm mt-2">Hardware status</p>
        </div>
    </div>
</div>
{% endblock %}
