<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Route</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-6">
    <div class="mx-auto max-w-3xl rounded-2xl border border-white/10 bg-white/5 p-8">
        <h1 class="text-3xl font-bold">Assign Route</h1>
        <p class="mt-2 text-slate-400">Assign this route to a driver</p>

        <div class="mt-6 rounded-xl border border-white/10 bg-slate-900 p-4">
            <p><strong>Route:</strong> {{ route.route_name }}</p>
            <p><strong>Total Bins:</strong> {{ route.total_bins }}</p>
            <p><strong>Status:</strong> {{ route.status }}</p>
        </div>

        <form method="post" class="mt-6 space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="rounded-xl bg-emerald-400 px-6 py-3 font-semibold text-slate-950">
                Assign Route
            </button>
        </form>

        <div class="mt-6">
            <a href="/routes/" class="text-sky-300 hover:underline">Back to route list</a>
        </div>
    </div>
</body>
</html>
