<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Skip</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-2xl rounded-2xl border border-white/10 bg-white/5 p-8">
        <h1 class="text-3xl font-bold">Skip Stop</h1>
        <p class="mt-3 text-slate-400">
            Add a reason for skipping this bin.
        </p>

        <div class="mt-6 rounded-xl border border-white/10 bg-slate-900 p-4">
            <p><strong>Route:</strong> {{ stop.route.route_name }}</p>
            <p><strong>Bin ID:</strong> {{ stop.bin.bin_id }}</p>
            <p><strong>Bin Name:</strong> {{ stop.bin.name }}</p>
            <p><strong>Location:</strong> {{ stop.bin.location_name }}</p>
        </div>

        <form method="post" class="mt-6 space-y-4">
            {% csrf_token %}
            <div>
                <label class="mb-2 block text-sm font-medium">Reason</label>
                <textarea name="reason" rows="4" class="w-full rounded-xl border border-white/10 bg-slate-900 px-4 py-3 text-white"></textarea>
            </div>
            <div class="flex gap-4">
                <button type="submit" class="rounded-xl bg-yellow-400 px-6 py-3 font-semibold text-slate-950">
                    Confirm Skip
                </button>
                <a href="{% url 'route_detail' stop.route.id %}" class="rounded-xl border border-white/10 px-6 py-3">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
