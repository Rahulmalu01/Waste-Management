{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Waste{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body id="body" class="bg-slate-900 text-white transition-colors duration-300">
    {% include "base/navbar.html" %}
    <main class="min-h-screen max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}
        {% endblock content %}
    </main>
    {% include "base/footer.html" %}
    {% include "base/bot.html" %}
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
